name: Build and publish coco-flow image

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
  # Optional: rebuild periodically to pick up latest coco-canonical when tracking main
  schedule:
    - cron: "0 3 * * *"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: cocoflow
      COCO_CANONICAL_REF: main
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          docker build \
            --build-arg COCO_CANONICAL_REF=${{ env.COCO_CANONICAL_REF }} \
            -t ${IMAGE_ID}:latest \
            .

      - name: Push image
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          docker push ${IMAGE_ID}:latest

